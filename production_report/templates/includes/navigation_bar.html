{% load socialaccount %}
{% load static %}

<div class="container-fluid align-items-center">

    <a class="navbar-brand d-flex align-items-center" href="{% url 'home:home_screen' %}"> 
        <img src="{% static 'img/logo.png' %}" alt="KGPCo Logo" width="100" height="50">
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navLinks" aria-controls="navLinks" aria-expanded="false" arial-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>

    <form class="bs-nav-search d-none d-lg-flex align-items-center nav-center-absolute" action="{% url 'order_tracker:order_tracker' %}" method="GET">

        <i class="bi bi-search ms-3"></i>
        <input type="text" name="search" placeholder="No. Orden (Build ID)" required>

    </form>

    <div class="collapse navbar-collapse justify-content-end" id="navLinks">
        <ul class="navbar-nav mb-2 mb-lg-0 align-items-center gap-2">

            <li class="nav-item ms-lg-3 mt-2 mt-lg-0">
                <div class="or-icon d-flex align-items-center cursor-pointer">
                    <i class="bi bi-file-earmark-bar-graph-fill"></i>
                    <a class="nav-link or-link" href="{% url 'report_generator:report_list' %}">Reportes</a>
                </div>
            </li>


            <li class="nav-item d-none d-lg-block">
                <div class="nav-divider"></div>
            </li>

            <li class="nav-item">
                <div class="or-icon d-flex align-items-center">
                    <i class="bi bi-clipboard2-minus-fill"></i>
                    <a class="nav-link or-link" href="{% url 'order_tracker:order_tracker' %}">Orden</a>
                </div>
            </li>

            <li class="nav-item d-none d-lg-block">
                <div class="nav-divider"></div>
            </li>

            <li class="nav-item ms-lg-3 mt-2 mt-lg-0">
                {% if user.is_authenticated %}
                    <div class="or-icon d-flex align-items-center cursor-pointer dropdown">
                        <div class="or-avatar d-flex justify-content-center align-items-center rounded-circle" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="bi bi-person-fill"></i>
                        </div>
                        <span class="ms-2 small dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
                            {{ user.first_name|default:user.email|default:"Usuario" }}
                        </span>

                        <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0 mt-2">
                            <li><h6 class="dropdown-header text-muted small">Cuentas corporativas</h6></li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <form mehtod="post" action="{% url 'account_logout' %}">
                                    {% csrf_token %}
                                        <button type="submit" class="dropdown-item text-danger d-flex align-items-center gap-2">
                                            <i class="bi bi-box-arrow-rigth"></i> Cerrar sesion
                                        </button>
                                </form>
                            </li>
                        </ul>
                    </div>
                {% else %}
                    <a href="{% provider_login_url 'microsoft' %}" class="btn btn-outline-dark d-flex align-items-center gap-2 rounded-pill px-4" style="background-color: white; border-color: #dee2e6">
                        <i class="bi bi-microsoft" style="color: #004aef"></i>
                        <span class="small fw-semibold">Iniciar con Microsoft</span>
                    </a>
                {% endif %}
            </li>

        </ul>

    </div>
</div>
