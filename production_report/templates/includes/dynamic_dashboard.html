<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() { 

        const canvas = document.getElementById('productionChart');
        if (!canvas) { 
            console.warn("No se encontro canvas");
            document.dispatchEvent(new Event('chartReady'));
            return;
         }

        const ctx = document.getElementById('productionChart').getContext('2d');
        const data = {{ chart_data|safe }};
        var gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, 'rgba(13, 110, 253, 0.8)');
        gradient.addColorStop(1, 'rgba(13, 110, 253, 0.3)');


        new Chart(ctx, { 
            type: 'bar',
            data: { 
                labels: data.labels,
                datasets: [{ 
                    label:data.label,
                    data:data.data,
                    borderColor: '#0d6efd',
                    backgroundColor: gradient,
                    borderRadius: 8,
                    borderWidth: 0,
                    barThickness: 40,
                    tension: 0.3,
                    fill: true
                 }]
             },
             options: { 
                responsive: true,
                maintainAspectRatio: false,
                animation: { 
                    onComplete: function() { 
                        document.dispatchEvent(new Event('chartReady'));
                    }
                 },
                scales: { 
                    y: { 
                        beginAtZero: true,
                        grid: { 
                            color: '#f0f0f0',
                            borderDash: [5, 5]
                         },
                        border: { display: false },
                        title: { display: true, text: 'Cantidad de Tethers' }
                     },
                    x: { 
                        grid: { display: false }
                     }
                 }
              }
         });
    });
</script>
