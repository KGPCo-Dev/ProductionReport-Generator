<div id="loading-spinner" class="text-center my-5">
    <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
        <span class="mt-2 text-muted fw-bold"></span>
    </div>
    <p class="mt-2 text-muted fw-bold">Procesando...</p>
</div>

<script>
    $(document).ready(function () { 
        var tableReady = $('#dynamicTable').length === 0;
        var chartReady = $('#productionChart').length === 0;

        function checkAllReady() { 
            console.log("tableReady val:", tableReady, "chartReady val:", chartReady)
            if (tableReady && chartReady) {
                console.log("Iniciando UI")
                $('#loading-spinner').fadeOut(200, function() { 
                    $('#table-container').fadeIn(400);
                    $('#dashboard-container').fadeIn(400);
                });
            }
        }

        document.addEventListener('chartReady', function() { 
            chartReady = true;
            checkAllReady();
        });

        if ($('#dynamicTable').length) { 
            $('#loading-spinner').show();
            $('#dynamicTable').DataTable ({ 
                "pageLength": 10,
                "language": { 
                    "url": "//cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json"
                 },
                 "initComplete": function(settings, json) { 
                    tableReady = true;
                    checkAllReady();
                  }
             });
        } else { 
            if(chartReady) $('#loading-spinner').hide(); 
        }

        $('form').on('submit', function () { 
            if ($(this).attr('method').toLowerCase() === 'get') { 
                $('#table-container').hide();
                $('#dashboard-container').hide();
                $('#loading-spinner').show();

                tableReady = false;
                chartReady = false;
             }
         });

     });
</script>
