<!-- This loader_script waits for page processes to be completed in order to execute fade out 
 In order to make it work is needed to register an event id.
 var $chart = $('#productionChart'); for classes

-->

<div id="loading-spinner" class="text-center my-s">
    <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
        <span class="mt-2 text-muted fw-bold"></span>
    </div>
    <p class="mt-2 text-muted fw-bold">Procesando...</p>
</div>

<script>
    window.PageLoader = { 
        tasks: new Set(),

        dataTableSpanish: { 
            "processing": "Procesando...",
            "lengthMenu": "Mostrar _MENU_ registros",
            "ZeroRecords": "No se encontraron resultados",
            "EmptyTable": "No hay datos para esta table",
            "info": "Mostrando registros del _START_ al _END_ de un total de _TOTAL_ regristros",
            "infoEmpty": "Mostrando registros del 0 al 0 con un total de 0 registros",
            "infoFiltered": "( filtrado de un total de _TOTAL_ registros )",
            "search": "Buscar",
            "loadingRecords": "Cargando...",
            "paginate": { 
                "first": "Primero",
                "last": "Ultimo",
                "next": "Siguiente",
                "previous": "Anterior"
             }
         },

        register: function(taskId) { 
            this.tasks.add(taskId);
            console.log(`[PageLoader] Tarea registrada: ${taskId}. Pendientes: ${this.tasks.size}`);
            $('#loading-spinner').show();
            $('.js-table-container').hide();
            $('#dashboard-container').hide();
          },

        finish: function(taskId) { 
            if (this.tasks.has(taskId)) { 
                this.tasks.delete(taskId);
                this.check();
             }
           },

        check: function() { 
            if (this.tasks.size === 0) { 
                console.log("[PageLoader] Todas las tareas completadas. Mostrando UI.");
                $('#loading-spinner').fadeOut(200, function() { 
                    $('.js-table-container').fadeIn(400);
                    $('#dashboard-container').fadeIn(400);
                 });
            }
        }
    };
     // DataTable configuration //

    $(document).ready(function() { 
        $.fn.dataTable.ext.errMode = 'none';

        var $processTable = $('#processTable');
        var $dynamicTable = $('#dynamicTable');
        var $chart = $('#productionChart');

        if ($processTable.length) PageLoader.register('processTable');
        if ($dynamicTable.length) PageLoader.register('dynamicTable');
        if ($chart.length)        PageLoader.register('productionChart');

        if ($processTable.length) { 
            $processTable.DataTable({ 
                "pageLength": 10,
                "ordering": false,
                "language": PageLoader.dataTableSpanish,
                "initComplete": function() { PageLoader.finish('processTable'); }
             });
         }

        if ($dynamicTable.length) { 
            $dynamicTable.DataTable({ 
                "pageLength": 10,
                "language": PageLoader.dataTableSpanish,
                "initComplete": function() { PageLoader.finish('dynamicTable'); }
             });
         }
        
        if ($chart.length) { 
            document.addEventListener('chartReady', function() { 
                PageLoader.finish('productionChart');
             });
         }

        PageLoader.check();

        $('form').on('submit', function() { 
            if ($(this).attr('method').toLowerCase() === 'get') { 
                $('.js-table-container').hide();
                $('#dashboard-container').hide();
                $('#loading-spinner').show();
                }
            });
    });
</script>
