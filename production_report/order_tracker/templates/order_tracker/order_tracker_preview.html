{% extends 'base.html' %} 
{% block title %}Inicio - KGPCo{% endblock %} 
{% block content %}
  <h1>Consulta estatus de orden</h1>

  <div class="search-container">

    <form id="order-search-bar" action="" method="get">
      <div id="search-bar-div" class="input-group">

        <input type="text" class="form-control" placeholder="Buscar order(Build ID)..." name="search">

        <button class="btn btn-primary" type="submit">
          <i class="bi bi search"></i>
        </button>
      </div>
    </form>

  </div>

  {% if build_id %}
    <div>
       Resultados de la orden: <strong>{{ build_id }}</strong>
    </div>
  {% endif %}
{% endblock %}
